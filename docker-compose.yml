services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: elegant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elegant_solutions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Web Application
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: elegant-web
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/elegant_solutions?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-super-secret-change-in-production}"
      AUTH_URL: "http://localhost:3000"
      AI_SERVICE_URL: "http://ai-service:8000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # AI Service (Stub - Phase 2)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: elegant-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/elegant_solutions?schema=public"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: elegant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - ai-service

volumes:
  postgres_data:
